name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: tp2excel.exe
          - os: macos-latest
            artifact: tp2excel
          - os: ubuntu-latest
            artifact: tp2excel-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --name tp2excel main.py

      - name: Rename artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mv dist/tp2excel dist/tp2excel-linux

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
